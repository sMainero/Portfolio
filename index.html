<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/+esm",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pkbd</title>
    <link rel="stylesheet" href="css/pokemonBorder.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/canvas.css" />
    <link rel="stylesheet" href="css/arrowKeys.css" />

    <script src="js/index.js" type="module"></script>
  </head>
  <body>
    <header class="header">
      <div class="pkbd pkbd-clickable" onclick="resetCamera()">
        Reset Camera
      </div>
      <div class="pkbd pkbd-clickable" onclick="setGameCamera()">
        Game Camera
      </div>
    </header>
    <main class="canvas-container">
      <canvas class="main-canvas" id="renderCanvas" tabindex="0"></canvas>
      <!-- <canvas id="debug-canvas" width="437" height="1240"></canvas> -->
    </main>
    <div class="canvas-container game-container">
      <canvas
        class="main-canvas"
        id="mainCanvas"
        width="480"
        height="432"
        tabindex="0"
      ></canvas>
    </div>
    <div class="game-instructions-container">
      <p class="pkbd sm game-instructions">
        Click on the game screen to interact and enable sound
      </p>
    </div>
    <div class="info" id="info">
      <p class="pkbd sm">Controls:</p>
      <p class="pkbd sm">Arrow keys to move</p>
    </div>
    <div class="controls" id="controls">
      <div id="arrowKeys" class="arrowKeys">
        <div id="arrowKeyUp" class="arrowKey up"></div>
        <div id="arrowKeyDown" class="arrowKey down"></div>
        <div id="arrowKeyLeft" class="arrowKey left"></div>
        <div id="arrowKeyRight" class="arrowKey right"></div>
      </div>
    </div>
  </body>
</html>
