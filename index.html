<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/+esm",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
      }
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>pkbd</title>
    <link rel="stylesheet" href="css/pokemonBorder.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/canvas.css" />
    <link rel="stylesheet" href="css/keys.css" />

    <script src="js/index.js" type="module"></script>
  </head>
  <body>
    <main class="canvas-container">
      <canvas class="main-canvas" id="renderCanvas" tabindex="0"></canvas>
      <!-- <canvas id="debug-canvas" width="437" height="1240"></canvas> -->
      <div class="camera-controls">
        <button class="pkbd pkbd-clickable sm invert" onclick="resetCamera()">
          Reset Camera
        </button>
        <button class="pkbd pkbd-clickable sm invert" onclick="setGameCamera()">
          Game Camera
        </button>
      </div>
      <div class="info" id="info">
        <p class="pkbd sm invert">
          Controls: Arrow keys to move, Enter key to interact
        </p>
      </div>
    </main>
    <div class="canvas-container game-container">
      <canvas
        class="main-canvas"
        id="mainCanvas"
        width="480"
        height="432"
        tabindex="0"
      ></canvas>
    </div>
    <!-- <div class="game-instructions-container">
      <p class="pkbd sm game-instructions">
        Click on the game screen to interact and enable sound
      </p>
    </div> -->

    <div class="controls" id="controls">
      <div id="arrowKeys" class="arrowKeys">
        <div id="arrowKeyUp" class="arrowKey up"></div>
        <div id="arrowKeyDown" class="arrowKey down"></div>
        <div id="arrowKeyLeft" class="arrowKey left"></div>
        <div id="arrowKeyRight" class="arrowKey right"></div>
      </div>
      <div id="controlKeys" class="controlKeys">
        <div id="controlKeyA" class="controlKey a">A</div>
        <div id="controlKeyB" class="controlKey b">B</div>
      </div>
    </div>
  </body>
</html>
